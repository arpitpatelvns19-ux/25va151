<!DOCTYPE html>
<html>
<head>
    <title>TechStore</title>
    <link rel="stylesheet" href="project.css">
</head>

<body>

<header>
    <h1>TechStore</h1>

    <input type="text" id="search" placeholder="Search Products">

    <button onclick="searchProduct()">Find</button>

    <div>
        Cart: <span id="cartCount">0</span>
    </div>
</header>

<hr>

<nav>
    <span>Mobiles</span> |
    <span>Laptops</span> |
    <span>Accessories</span> |
    <span>Gaming</span>
</nav>

<section>
    <h2>Welcome to TechStore</h2>
    <p>Best gadgets at affordable prices.</p>
</section>

<h2>Featured Products</h2>

<div class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" width="200">
        <h3>Bluetooth Headphones</h3>
        <p>₹1999</p>
        <button onclick="addCart()">Buy Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" width="200">
        <h3>Digital Watch</h3>
        <p>₹2999</p>
        <button onclick="addCart()">Buy Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=400" width="200">
        <h3>Gaming Laptop</h3>
        <p>₹49999</p>
        <button onclick="addCart()">Buy Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=400" width="200">
        <h3>Smartphone</h3>
        <p>₹14999</p>
        <button onclick="addCart()">Buy Now</button>
    </div>

</div>

<footer>
    <p>© 2026 TechStore</p>
</footer>

<script src="project.js"></script>

</body>
</html>
